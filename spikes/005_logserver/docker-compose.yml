x-common-environment: &common-environment
  LOG_LEVEL: ${LOG_LEVEL:-info}
  PYTHONUNBUFFERED: "1"

services:
  # NGINX Gateway - Routes all MCP server traffic
  nginx-gateway:
    image: nginx:alpine
    container_name: mcp-nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/nginx.conf:ro
      - ./.ssl-certs/nginx.crt:/etc/nginx/ssl/mcp.crt:ro
      - ./.ssl-certs/nginx.key:/etc/nginx/ssl/mcp.key:ro
      - /tmp/log/nginx:/var/log/nginx
    depends_on:
      - main-server
      - log-server
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Log MCP Server - Security log analysis
  main-server:
    build:
      context: ../..
      dockerfile: spikes/005_logserver/Dockerfile.test
      args:
        BUILD_CONTEXT: spikes/005_logserver
        PACKAGE_CONTEXT: .      
    container_name: main-server
    environment:
      <<: *common-environment
      SERVER_NAME: main-server
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
    expose:
      - "8000"
    networks:
      - mcp-network
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    volumes:
      - ./main_mcp_server.py:/app/server.py:ro
      - ./.env:/app/.env:ro
      - /tmp/log/main-mcp-server:/app/logs

  log-server:
    build:
      context: ../..
      dockerfile: spikes/005_logserver/Dockerfile.log
      args:
        BUILD_CONTEXT: spikes/005_logserver
        PACKAGE_CONTEXT: .      
    container_name: log-server
    environment:
      <<: *common-environment
      SERVER_NAME: log-server
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
    expose:
      - "8000"
    networks:
      - mcp-network
    restart: unless-stopped
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    volumes:
      - ./log_mcp_server.py:/app/server.py:ro
      - ./.env:/app/.env:ro
      - /tmp/log/log-mcp-server:/app/logs

networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mcp-logs:
    driver: local
